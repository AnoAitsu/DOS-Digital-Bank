<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EGP ATM Machine</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121212; /* Deep dark background */
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px;
}

.atm-container{
    width:700px;
    background:#1e1e1e; /* Dark container card background */
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.4); /* Darker shadow for depth */
}

h2{
    text-align:center;
    margin-bottom:5px;
    color:#64b5f6; /* High-contrast neon blue for headers */
}

/* User Profile Header Section */
.user-profile {
    text-align: center;
    margin-bottom: 20px;
    font-size: 16px;
    color: #b0b0b0; /* Light gray text */
}

.user-profile strong {
    color: #ffffff; /* Bright white name */
}

#balance{
    font-size:22px;
    font-weight:bold;
    text-align:center;
    color:#81c784; /* Soft bright green for visibility */
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #444; /* Dark border */
    background:#2d2d2d; /* Charcoal input area */
    color:#ffffff; /* White input text */
    border-radius:6px;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

button{
    padding: 12px 28px;
    border: none;
    background: #2563eb;
    color: white;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    transform: skew(-20deg);
}

button:hover{
    opacity:.9;
}

.buttons button:nth-child(1){
    background:#1565c0;
}

.buttons button:nth-child(2){
    background:#2e7d32;
}

.buttons button:nth-child(3){
    background:#c62828;
}

#message{
    margin-top:20px;
    padding:12px;
    background:#2d2d2d; /* Charcoal alert box */
    color:#f5f5f5;
    border-left:5px solid #1565c0;
    border-radius:5px;
    font-weight:bold;
}

hr{
    margin:25px 0;
    border: 0;
    border-top: 1px solid #444; /* Dark divider lines */
}

h3{
    margin-bottom:10px;
    color:#f5f5f5;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
    color:#f5f5f5;
}

table th{
    background:#1565c0;
    color:white;
    padding:10px;
}

table td{
    border:1px solid #444; /* Dark grid layout */
    padding:8px;
    text-align:center;
}

table tbody tr:nth-child(even){
    background:#2a2a2a; /* Zebra striping with subtle dark gray */
}
</style>

</head>
<body>

<div class="atm-container">

    <h2>DOS Digital Bank</h2>

    <img src="D:\BIT32\HTML of Things\EA4\DOS_logo.png" alt="Bank Logo" style="width: 100px; height: auto; display: block; margin: 0 auto;">

    
    <div class="user-profile">
        <br>
        Welcome Back, <strong id="userNameDisplay">John Doe</strong>
    </div>

    <p id="balance">Balance: ₱0.00</p>

    <input
    type="number"
    id="amount"
    placeholder="Enter Amount">

    <div class="buttons">
    <button onclick="checkBalance()">Check Balance</button>
    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>
    </div>

    <div id="message">
    Welcome! Please choose a transaction.
    </div>

    <hr>

    <h3>Transaction Summary (Audit Log)</h3>

    <table id="logTable">
    <thead>
    <tr>
    <th>No.</th>
    <th>Date & Time</th>
    <th>Transaction</th>
    <th>Amount</th>
    <th>Balance</th>
    </tr>
    </thead>

    <tbody>

    </tbody>

    </table>

</div>

<script>

let balance = 0;
let transactionLog = [];

/* USER PROFILE CONFIGURATION */
let currentUserName = "Juan Dela Cruz"; 
document.getElementById("userNameDisplay").innerText = currentUserName;

/* APPS SCRIPT WEB APP CONFIGURATION */
// Your lines from the image are integrated right here:
const scriptURL = 'https://script.google.com/macros/s/AKfycbxodtrDVmb3rHXgauV4A9CanHdjBfzSmJ8i8yPqB0lowu2wCsvKConmltaYN5lN_iSRLg/exec';
const form = document.getElementById('googleForm');

/* CHECK BALANCE */
function checkBalance(){
    showMessage(`Your current balance is ₱${balance.toFixed(2)}`);
    addTransaction("Balance Inquiry", 0);
}

/* DEPOSIT */
function deposit(){
    let amount = getAmount();
    if(isNaN(amount) || amount<=0){
        showMessage("Please enter a valid deposit amount.");
        return;
    }
    balance += amount;
    updateBalance();
    showMessage(`Successfully deposited ₱${amount.toFixed(2)}.`);
    addTransaction("Deposit", amount);
    clearInput();
}

/* WITHDRAW */
function withdraw(){
    let amount = getAmount();
    if(isNaN(amount) || amount<=0){
        showMessage("Please enter a valid withdrawal amount.");
        return;
    }
    if(amount>balance){
        showMessage("Insufficient funds.");
        return;
    }
    balance -= amount;
    updateBalance();
    showMessage(`Successfully withdrew ₱${amount.toFixed(2)}.`);
    addTransaction("Withdraw", amount);
    clearInput();
}

/* INPUT*/
function getAmount(){
    return parseFloat(document.getElementById("amount").value);
}

/* UPDATE BALANCE DISPLAY */
function updateBalance(){
    document.getElementById("balance").innerHTML=
    `Balance: ₱${balance.toFixed(2)}`;
}

/* SHOW MESSAGE */
function showMessage(message){
    document.getElementById("message").innerHTML=message;
}

/* CLEAR INPUT */
function clearInput(){
    document.getElementById("amount").value="";
}

/* ADD TRANSACTION */
function addTransaction(type, amount){
    const timestamp = new Date().toLocaleString();

    // Update local table UI array
    transactionLog.push({
        datetime: timestamp,
        transaction: type,
        amount: amount,
        balance: balance
    });
    updateLogTable();

    // Prepare data matching your Apps Script keys (data.number, data.name, etc.)
    const logNumber = transactionLog.length;

    const formData = new URLSearchParams();
    formData.append("number", logNumber);
    formData.append("name", currentUserName);
    formData.append("transaction", type);
    formData.append("amount", amount.toFixed(2));
    formData.append("balance", balance.toFixed(2));

    // Send transaction data to your Google Sheet Web App using your scriptURL variable
    if (scriptURL && scriptURL !== "") {
        fetch(scriptURL, {
            method: "POST",
            body: formData,
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            }
        })
        .then(response => response.text())
        .then(text => console.log("Google Sheets logging status:", text))
        .catch(error => console.error("Error logging to Google Sheets:", error));
    } else {
        console.warn("Google Sheets logging skipped. Please verify your scriptURL value.");
    }
}

/* UPDATE TABLE */ 
function updateLogTable(){
    let tbody=document.querySelector("#logTable tbody");
    tbody.innerHTML="";
    transactionLog.forEach(function(item, index){
        tbody.innerHTML+=`
        <tr>
            <td>${index+1}</td>
            <td>${item.datetime}</td>
            <td>${item.transaction}</td>
            <td>₱${item.amount.toFixed(2)}</td>
            <td>₱${item.balance.toFixed(2)}</td>
        </tr>
        `;
    });
}

</script>

</body>
</html>
